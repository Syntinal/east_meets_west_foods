<svg xmlns="http://www.w3.org/2000/svg" width="420" height="420" viewBox="0 0 420 420">
  <g fill="#c8102e" opacity="0.08">
    <!-- jiaozi (dumpling) top-left -->
    <g transform="translate(30,80) rotate(-12)">
      <path d="M0,42 Q55,-18 110,42 Q98,30 88,36 Q78,14 68,30 Q58,14 48,30 Q38,14 28,30 Q18,30 8,38 Q4,40 0,42 Z"/>
    </g>
    <!-- bao bun top-right -->
    <g transform="translate(250,50) rotate(8)">
      <ellipse cx="42" cy="44" rx="42" ry="36"/>
    </g>
    <!-- jiaozi bottom-right -->
    <g transform="translate(230,250) rotate(22)">
      <path d="M0,42 Q55,-18 110,42 Q98,30 88,36 Q78,14 68,30 Q58,14 48,30 Q38,14 28,30 Q18,30 8,38 Q4,40 0,42 Z"/>
    </g>
    <!-- bao bun bottom-left -->
    <g transform="translate(50,270) rotate(-15)">
      <ellipse cx="40" cy="42" rx="38" ry="34"/>
    </g>
    <!-- small jiaozi mid -->
    <g transform="translate(160,170) rotate(40) scale(0.55)">
      <path d="M0,42 Q55,-18 110,42 Q98,30 88,36 Q78,14 68,30 Q58,14 48,30 Q38,14 28,30 Q18,30 8,38 Q4,40 0,42 Z"/>
    </g>
  </g>

  <!-- pinch / pleat detail lines -->
  <g stroke="#9c0b22" stroke-width="2" fill="none" opacity="0.12" stroke-linecap="round">
    <!-- pleats on top-left jiaozi -->
    <g transform="translate(30,80) rotate(-12)">
      <path d="M28,30 L33,18 M48,30 L53,16 M68,30 L73,18 M88,36 L92,24"/>
    </g>
    <!-- pinch on top-right bao -->
    <g transform="translate(250,50) rotate(8)">
      <path d="M22,28 Q30,16 36,26 Q42,14 48,26 Q54,16 62,28"/>
    </g>
    <!-- pleats on bottom-right jiaozi -->
    <g transform="translate(230,250) rotate(22)">
      <path d="M28,30 L33,18 M48,30 L53,16 M68,30 L73,18 M88,36 L92,24"/>
    </g>
    <!-- pinch on bottom-left bao -->
    <g transform="translate(50,270) rotate(-15)">
      <path d="M20,26 Q28,14 34,24 Q40,12 46,24 Q52,14 60,26"/>
    </g>
  </g>
</svg>

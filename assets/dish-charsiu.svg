<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
  <rect width="400" height="300" fill="#f5e0d4"/>
  <!-- bamboo steamer with parchment -->
  <ellipse cx="200" cy="240" rx="180" ry="42" fill="#a07c54"/>
  <ellipse cx="200" cy="226" rx="180" ry="38" fill="#c89a6a"/>
  <ellipse cx="200" cy="222" rx="170" ry="32" fill="#e6c89a"/>
  <!-- parchment paper square -->
  <rect x="60" y="180" width="280" height="60" rx="2" fill="#fbf6e8" opacity="0.6"/>
  <!-- 3 fluffy white buns with split tops -->
  <g>
    <!-- bun 1 -->
    <ellipse cx="115" cy="180" rx="50" ry="42" fill="#ffffff"/>
    <ellipse cx="115" cy="180" rx="50" ry="42" fill="#fdf6e3" opacity="0.6"/>
    <!-- crack showing red filling -->
    <path d="M95,160 Q115,150 135,162 Q132,166 128,164 Q120,158 115,162 Q108,160 102,165 Q98,164 95,160 Z" fill="#c8102e"/>
    <path d="M100,170 Q115,164 130,172" stroke="#9c0b22" stroke-width="2" fill="none"/>

    <!-- bun 2 -->
    <ellipse cx="200" cy="170" rx="54" ry="46" fill="#ffffff"/>
    <ellipse cx="200" cy="170" rx="54" ry="46" fill="#fdf6e3" opacity="0.5"/>
    <path d="M178,148 Q200,138 222,150 Q218,154 214,152 Q205,144 200,150 Q193,146 186,154 Q182,152 178,148 Z" fill="#c8102e"/>
    <path d="M183,158 Q200,150 218,160" stroke="#9c0b22" stroke-width="2" fill="none"/>

    <!-- bun 3 -->
    <ellipse cx="285" cy="180" rx="50" ry="42" fill="#ffffff"/>
    <ellipse cx="285" cy="180" rx="50" ry="42" fill="#fdf6e3" opacity="0.6"/>
    <path d="M265,160 Q285,150 305,162 Q302,166 298,164 Q290,158 285,162 Q278,160 272,165 Q268,164 265,160 Z" fill="#c8102e"/>
    <path d="M270,170 Q285,164 300,172" stroke="#9c0b22" stroke-width="2" fill="none"/>
  </g>
  <!-- soft shading underside of buns -->
  <g fill="#000" opacity="0.06">
    <ellipse cx="115" cy="218" rx="50" ry="6"/>
    <ellipse cx="200" cy="212" rx="54" ry="6"/>
    <ellipse cx="285" cy="218" rx="50" ry="6"/>
  </g>
  <!-- steam wisps -->
  <g fill="#fff" opacity="0.7">
    <ellipse cx="120" cy="100" rx="22" ry="12"/>
    <ellipse cx="200" cy="80" rx="28" ry="14"/>
    <ellipse cx="280" cy="100" rx="22" ry="12"/>
  </g>
</svg>

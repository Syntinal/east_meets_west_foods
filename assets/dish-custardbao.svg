<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
  <rect width="400" height="300" fill="#f8e8b0"/>
  <!-- white plate -->
  <ellipse cx="200" cy="180" rx="190" ry="115" fill="#fff"/>
  <ellipse cx="200" cy="180" rx="170" ry="100" fill="#fbf6e8"/>
  <!-- 3 yellow custard buns -->
  <g>
    <!-- bun 1 (back) -->
    <g transform="translate(115,170)">
      <ellipse cx="0" cy="0" rx="50" ry="44" fill="#f9d860"/>
      <ellipse cx="-15" cy="-15" rx="22" ry="14" fill="#fde08e" opacity="0.7"/>
      <!-- pinch top -->
      <circle cx="0" cy="-30" r="6" fill="#e8b840"/>
      <path d="M-18,-22 Q-8,-32 0,-26 Q8,-32 18,-22" stroke="#c89820" stroke-width="2" fill="none"/>
    </g>
    <!-- bun 2 — split open showing custard lava -->
    <g transform="translate(210,158)">
      <ellipse cx="0" cy="0" rx="56" ry="48" fill="#f9d860"/>
      <ellipse cx="-18" cy="-16" rx="24" ry="16" fill="#fde08e" opacity="0.7"/>
      <!-- molten custard pouring -->
      <path d="M-30,-10 Q-20,4 -10,-2 Q0,8 10,0 Q22,8 32,-4 Q35,18 25,30 Q15,40 -5,38 Q-25,32 -32,18 Z" fill="#f5b820"/>
      <path d="M-18,4 Q-8,18 4,12 Q14,22 24,16" stroke="#d49810" stroke-width="2" fill="none"/>
      <ellipse cx="0" cy="14" rx="14" ry="6" fill="#c88810"/>
      <!-- pinch top -->
      <circle cx="0" cy="-34" r="6" fill="#e8b840"/>
      <path d="M-20,-26 Q-10,-36 0,-30 Q10,-36 20,-26" stroke="#c89820" stroke-width="2" fill="none"/>
    </g>
    <!-- bun 3 -->
    <g transform="translate(295,170)">
      <ellipse cx="0" cy="0" rx="50" ry="44" fill="#f9d860"/>
      <ellipse cx="-15" cy="-15" rx="22" ry="14" fill="#fde08e" opacity="0.7"/>
      <circle cx="0" cy="-30" r="6" fill="#e8b840"/>
      <path d="M-18,-22 Q-8,-32 0,-26 Q8,-32 18,-22" stroke="#c89820" stroke-width="2" fill="none"/>
    </g>
  </g>
  <!-- shadows -->
  <g fill="#000" opacity="0.06">
    <ellipse cx="115" cy="218" rx="48" ry="6"/>
    <ellipse cx="210" cy="210" rx="55" ry="6"/>
    <ellipse cx="295" cy="218" rx="48" ry="6"/>
  </g>
  <!-- mint sprig garnish -->
  <g>
    <ellipse cx="60" cy="120" rx="6" ry="10" fill="#5d8a3a" transform="rotate(-30 60 120)"/>
    <ellipse cx="68" cy="116" rx="5" ry="8" fill="#7eb24a" transform="rotate(20 68 116)"/>
    <line x1="55" y1="130" x2="68" y2="118" stroke="#4a6a30" stroke-width="1.5"/>
  </g>
</svg>

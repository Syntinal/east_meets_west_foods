    <path d="M260,160 Q285,147 310,160" stroke="#e87a5a" stroke-width="3" fill="none" opacity="0.7"/>
  </g>
  <!-- pleats -->
  <g stroke="#d18d6e" stroke-width="1.8" fill="none" stroke-linecap="round">
    <path d="M86,156 Q92,144 100,154 Q108,142 116,152 Q124,142 132,152 Q140,144 148,156"/>
    <path d="M164,146 Q172,132 180,144 Q188,130 196,142 Q204,130 212,142 Q220,132 228,146"/>
    <path d="M253,158 Q259,146 267,156 Q275,144 283,154 Q291,144 299,154 Q307,146 313,158"/>
  </g>
  <!-- front row -->
  <g>
    <ellipse cx="160" cy="208" rx="44" ry="28" fill="#f8c8b3"/>

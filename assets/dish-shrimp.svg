    <path d="M320,135 L332,132 L330,140 L322,140 Z"/>
  </g>
  <!-- microgreens -->
  <g stroke="#5d8a3a" stroke-width="2" stroke-linecap="round">
    <line x1="55" y1="195" x2="65" y2="200"/>
    <line x1="60" y1="190" x2="68" y2="198"/>
    <line x1="335" y1="200" x2="345" y2="195"/>

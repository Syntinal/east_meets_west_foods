  <!-- back row -->
  <g>
    <ellipse cx="120" cy="160" rx="46" ry="30" fill="#f8c8b3"/>
    <ellipse cx="120" cy="160" rx="42" ry="26" fill="#fbdcc8" opacity="0.8"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
  <rect width="400" height="300" fill="#d8d4b8"/>
  <!-- bamboo round mat -->
  <ellipse cx="200" cy="170" rx="190" ry="115" fill="#c8b88a"/>
  <ellipse cx="200" cy="168" rx="180" ry="105" fill="#dcc89a"/>
  <!-- bamboo slats -->
  <g stroke="#a07c54" stroke-width="1.2" opacity="0.4">
    <line x1="40" y1="120" x2="360" y2="120"/>
    <line x1="40" y1="140" x2="360" y2="140"/>
    <line x1="40" y1="160" x2="360" y2="160"/>
    <line x1="40" y1="180" x2="360" y2="180"/>
    <line x1="40" y1="200" x2="360" y2="200"/>
    <line x1="40" y1="220" x2="360" y2="220"/>
  </g>
  <!-- 5 green-tinted dumplings -->
  <g>
    <ellipse cx="120" cy="160" rx="44" ry="28" fill="#dde4b8"/>
    <ellipse cx="120" cy="160" rx="40" ry="24" fill="#e8eec8" opacity="0.7"/>
    <ellipse cx="208" cy="148" rx="48" ry="32" fill="#dde4b8"/>
    <ellipse cx="208" cy="148" rx="44" ry="28" fill="#e8eec8" opacity="0.7"/>
    <ellipse cx="290" cy="162" rx="44" ry="28" fill="#dde4b8"/>
    <ellipse cx="290" cy="162" rx="40" ry="24" fill="#e8eec8" opacity="0.7"/>
    <ellipse cx="160" cy="208" rx="42" ry="26" fill="#dde4b8"/>
    <ellipse cx="160" cy="208" rx="38" ry="22" fill="#e8eec8" opacity="0.7"/>
    <ellipse cx="252" cy="210" rx="42" ry="26" fill="#dde4b8"/>
    <ellipse cx="252" cy="210" rx="38" ry="22" fill="#e8eec8" opacity="0.7"/>
  </g>
  <!-- pleats -->
  <g stroke="#7a8a48" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M84,158 Q92,144 100,156 Q108,142 116,154 Q124,142 132,154 Q140,144 148,158"/>
    <path d="M168,146 Q176,130 184,144 Q192,128 200,142 Q208,128 216,142 Q224,130 232,146"/>
    <path d="M254,160 Q262,146 270,158 Q278,144 286,156 Q294,144 302,156 Q310,146 318,160"/>
    <path d="M126,206 Q132,194 140,204 Q148,192 156,200 Q164,192 172,200 Q180,194 188,206"/>
    <path d="M218,208 Q224,196 232,206 Q240,194 248,202 Q256,194 264,202 Q272,196 280,208"/>
  </g>
  <!-- shiitake mushroom slices garnish -->
  <g>
    <g transform="translate(60,110)">
      <ellipse cx="0" cy="0" rx="14" ry="6" fill="#7a4a2a"/>
      <ellipse cx="0" cy="-1" rx="11" ry="4" fill="#a07c54"/>
      <line x1="-8" y1="-1" x2="-3" y2="-2" stroke="#5a3a1a" stroke-width="0.8"/>
      <line x1="0" y1="-2" x2="2" y2="-3" stroke="#5a3a1a" stroke-width="0.8"/>
      <line x1="6" y1="-1" x2="9" y2="-2" stroke="#5a3a1a" stroke-width="0.8"/>
    </g>
    <g transform="translate(340,118)">
      <ellipse cx="0" cy="0" rx="14" ry="6" fill="#7a4a2a"/>
      <ellipse cx="0" cy="-1" rx="11" ry="4" fill="#a07c54"/>
      <line x1="-7" y1="-1" x2="-2" y2="-2" stroke="#5a3a1a" stroke-width="0.8"/>
      <line x1="3" y1="-2" x2="7" y2="-3" stroke="#5a3a1a" stroke-width="0.8"/>
    </g>
  </g>
  <!-- chive sprigs -->
  <g stroke="#5d8a3a" stroke-width="2.5" stroke-linecap="round">
    <line x1="80" y1="240" x2="105" y2="248"/>
    <line x1="295" y1="245" x2="320" y2="240"/>
    <line x1="200" y1="100" x2="225" y2="92"/>

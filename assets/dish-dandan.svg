    <path d="M90,175 Q150,160 215,175 Q265,185 310,170"/>
    <path d="M90,200 Q150,188 220,200 Q270,212 310,200"/>
  </g>
  <!-- ground pork crumbles on top -->
  <g fill="#5a2a18">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
  <rect width="400" height="300" fill="#efb898"/>
  <!-- dark bowl -->
  <ellipse cx="200" cy="180" rx="190" ry="118" fill="#1a1a1a"/>
  <ellipse cx="200" cy="178" rx="180" ry="108" fill="#2a2a2a"/>
  <!-- chili oil base -->
  <ellipse cx="200" cy="178" rx="170" ry="98" fill="#b85838"/>
  <ellipse cx="200" cy="178" rx="170" ry="98" fill="#c8102e" opacity="0.4"/>
  <!-- noodle nest -->
  <g stroke="#f5d68a" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.95">
    <path d="M70,150 Q120,130 180,150 Q240,170 320,150"/>
    <path d="M75,165 Q130,145 200,165 Q260,180 325,160"/>
    <path d="M80,180 Q140,165 210,180 Q270,190 320,175"/>

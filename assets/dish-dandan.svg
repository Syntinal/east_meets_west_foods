    <circle cx="225" cy="195" r="1.8"/>
    <circle cx="170" cy="195" r="2"/>
    <circle cx="250" cy="175" r="1.8"/>
    <circle cx="140" cy="190" r="1.5"/>
  </g>
  <!-- sichuan peppercorns -->

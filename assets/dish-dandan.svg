    <ellipse cx="220" cy="162" rx="6" ry="4"/>
    <ellipse cx="240" cy="170" rx="5" ry="3.5"/>
    <ellipse cx="155" cy="180" rx="6" ry="4"/>
    <ellipse cx="180" cy="185" rx="5" ry="3"/>
    <ellipse cx="210" cy="180" rx="6" ry="4"/>
    <ellipse cx="245" cy="190" rx="5" ry="3.5"/>
    <ellipse cx="135" cy="200" rx="5" ry="3"/>
    <ellipse cx="165" cy="205" rx="6" ry="4"/>
    <ellipse cx="225" cy="210" rx="5" ry="3.5"/>
  </g>
  <g fill="#7a3a22" opacity="0.7">
    <ellipse cx="178" cy="158" rx="3" ry="2"/>
    <ellipse cx="223" cy="165" rx="3" ry="2"/>
    <ellipse cx="158" cy="183" rx="3" ry="2"/>
    <ellipse cx="213" cy="183" rx="3" ry="2"/>
  </g>
  <!-- scallions -->
  <g fill="#7eb24a" stroke="#5d8a3a" stroke-width="0.8">

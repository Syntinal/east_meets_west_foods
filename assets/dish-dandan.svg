    <line x1="290" y1="78" x2="378" y2="166"/>
  </g>
  <g stroke="#5a3a1a" stroke-width="2" stroke-linecap="round">
    <line x1="370" y1="170" x2="378" y2="178"/>
    <line x1="378" y1="166" x2="386" y2="174"/>

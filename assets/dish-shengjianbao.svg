<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
  <rect width="400" height="300" fill="#ead7b3"/>
  <!-- cast iron pan -->
  <ellipse cx="200" cy="180" rx="200" ry="115" fill="#2a2a2a"/>
  <ellipse cx="200" cy="170" rx="180" ry="100" fill="#1a1a1a"/>
  <!-- oily sheen -->
  <ellipse cx="160" cy="130" rx="60" ry="20" fill="#3a3a3a" opacity="0.6"/>
  <!-- buns: round white tops, golden crispy bottoms -->
  <!-- back row -->
  <g>
    <ellipse cx="115" cy="160" rx="42" ry="36" fill="#fdf6e3"/>
    <path d="M73,160 Q73,196 115,196 Q157,196 157,160 Z" fill="#c8842a"/>
    <ellipse cx="200" cy="148" rx="46" ry="38" fill="#fdf6e3"/>
    <path d="M154,148 Q154,186 200,186 Q246,186 246,148 Z" fill="#c8842a"/>
    <ellipse cx="285" cy="160" rx="42" ry="36" fill="#fdf6e3"/>
    <path d="M243,160 Q243,196 285,196 Q327,196 327,160 Z" fill="#c8842a"/>
  </g>
  <!-- pinch detail on top of each -->
  <g stroke="#d4a872" stroke-width="2" fill="none" stroke-linecap="round">
    <circle cx="115" cy="138" r="5" fill="#d4a872"/>
    <circle cx="200" cy="124" r="5" fill="#d4a872"/>
    <circle cx="285" cy="138" r="5" fill="#d4a872"/>
    <path d="M97,140 Q108,128 115,138 Q122,128 133,140"/>
    <path d="M180,128 Q193,114 200,124 Q207,114 220,128"/>
    <path d="M267,140 Q278,128 285,138 Q292,128 303,140"/>
  </g>
  <!-- sesame seeds -->
  <g fill="#f5f1d4" stroke="#a07c54" stroke-width="0.6">
    <ellipse cx="100" cy="135" rx="2" ry="1.2"/>
    <ellipse cx="118" cy="128" rx="2" ry="1.2"/>
    <ellipse cx="130" cy="142" rx="2" ry="1.2"/>
    <ellipse cx="185" cy="120" rx="2" ry="1.2"/>
    <ellipse cx="205" cy="115" rx="2" ry="1.2"/>
    <ellipse cx="218" cy="128" rx="2" ry="1.2"/>
    <ellipse cx="270" cy="135" rx="2" ry="1.2"/>
    <ellipse cx="290" cy="128" rx="2" ry="1.2"/>
    <ellipse cx="302" cy="142" rx="2" ry="1.2"/>
  </g>
  <!-- scallion garnish -->
  <g stroke="#5d8a3a" stroke-width="2.5" stroke-linecap="round">
    <line x1="60" y1="190" x2="80" y2="200"/>
    <line x1="320" y1="195" x2="340" y2="188"/>
    <line x1="195" y1="98" x2="215" y2="92"/>
  </g>
  <g fill="#7eb24a">
    <circle cx="65" cy="188" r="2"/>
    <circle cx="335" cy="190" r="2"/>
    <circle cx="200" cy="100" r="2"/>
  </g>
</svg>

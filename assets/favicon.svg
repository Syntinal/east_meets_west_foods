<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <style>
    .bun { fill: #1a1a1a; }
    @media (prefers-color-scheme: dark) { .bun { fill: #ffffff; } }
  </style>
  <defs>
    <filter id="boost" x="0" y="0" width="100%" height="100%">
      <feComponentTransfer><feFuncA type="linear" slope="4" intercept="0"/></feComponentTransfer>
    </filter>
    <mask id="bun" mask-type="alpha" maskUnits="userSpaceOnUse" x="0" y="0" width="256" height="256">
      <image href="data:image/png;base64," x="-40" y="-40" width="336" height="336" filter="url(#boost)"/>
    </mask>
  </defs>
  <rect class="bun" width="256" height="256" mask="url(#bun)"/>
</svg>
